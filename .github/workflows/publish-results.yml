name: publish cluster results

on:
  workflow_run:
    workflows:
      - cluster worker
    types:
      - completed

permissions:
  contents: write
  actions: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: projectclownfish-publish-results
  cancel-in-progress: false

jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download worker artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          rm -rf artifacts
          mkdir -p artifacts
          final_artifact="projectclownfish-${RUN_ID}-${RUN_ATTEMPT:-1}"
          if gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$final_artifact" --dir artifacts; then
            exit 0
          fi
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --dir artifacts
          find artifacts -type d -name 'projectclownfish-worker-*' -prune -exec rm -rf {} +

      - name: Publish and commit result ledger
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN || github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            npm run publish-result -- artifacts \
              --run-id "$RUN_ID" \
              --run-url "$RUN_URL" \
              --head-sha "$HEAD_SHA" \
              --conclusion "$CONCLUSION"
            npm run finalize-open-prs -- --write-report
            npm run publish-result
            git add README.md results jobs/openclaw/closed apply-report.json
            if git diff --cached --quiet; then
              echo "No result changes"
              exit 0
            fi
            git commit -m "chore: publish cluster result"
            if git push origin main; then
              exit 0
            fi
          done
          exit 1

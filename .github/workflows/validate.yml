name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate job specs
        run: npm run validate

      - name: Render example prompt
        run: npm run render -- jobs/openclaw/cluster-example.md --mode plan > /tmp/projectclownfish-prompt.md

      - name: Dry-run worker
        run: npm run worker -- jobs/openclaw/cluster-example.md --mode plan --dry-run

      - name: Build offline autonomous artifact
        run: npm run build-fix-artifact -- jobs/openclaw/autonomous-example.md --offline

      - name: Check scripts
        run: |
          for f in scripts/*.mjs; do
            node --check "$f"
          done

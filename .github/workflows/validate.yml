name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate job specs
        run: npm run validate

      - name: Render example prompt
        run: npm run render -- jobs/openclaw/cluster-example.md --mode plan > /tmp/projectclownfish-prompt.md

      - name: Dry-run worker
        run: npm run worker -- jobs/openclaw/cluster-example.md --mode plan --dry-run

      - name: Build offline autonomous artifact
        run: npm run build-fix-artifact -- jobs/openclaw/autonomous-example.md --offline

      - name: Check scripts
        run: |
          node --check scripts/apply-result.mjs
          node --check scripts/plan-cluster.mjs

name: cluster worker

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job markdown path, for example jobs/openclaw/cluster-001.md"
        required: true
        type: string
      mode:
        description: "Worker mode"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
          - autonomous
      runner:
        description: "Runner label, e.g. ubuntu-latest or a Blacksmith label"
        required: true
        default: ubuntu-latest
        type: string
      model:
        description: "Codex model"
        required: true
        default: gpt-5.4
        type: string
      dry_run:
        description: "Render prompt and write a dry result without invoking Codex"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: projectclownfish-${{ inputs.job }}-${{ inputs.mode }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cluster:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
      CLOWNFISH_ALLOWED_OWNER: ${{ vars.CLOWNFISH_ALLOWED_OWNER || 'openclaw' }}
      CLOWNFISH_ALLOW_EXECUTE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLOWNFISH_ALLOW_EXECUTE || '0' }}
      CLOWNFISH_HYDRATE_COMMENTS: ${{ vars.CLOWNFISH_HYDRATE_COMMENTS || '0' }}
      CLOWNFISH_MAX_LINKED_REFS: ${{ vars.CLOWNFISH_MAX_LINKED_REFS || '0' }}
      CLOWNFISH_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify GitHub read token
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CLOWNFISH_READ_GH_TOKEN is required"
            exit 1
          fi
          gh auth status

      - name: Install Codex CLI
        run: |
          if ! command -v codex >/dev/null 2>&1; then
            npm install -g @openai/codex@latest
          fi
          codex --version

      - name: Authenticate Codex
        run: |
          test -n "${OPENAI_API_KEY:-}"
          test -n "${CODEX_API_KEY:-}"
          printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null

      - name: Validate job
        run: npm run validate:job -- "${{ inputs.job }}"

      - name: Run worker
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_READ_GH_TOKEN }}
        run: |
          args=("${{ inputs.job }}" --mode "${{ inputs.mode }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          npm run worker -- "${args[@]}"

      - name: Review worker result
        if: always()
        run: |
          if find .projectclownfish/runs -name result.json -print -quit | grep -q .; then
            npm run review-results -- .projectclownfish/runs
          fi

      - name: Apply safe closure actions
        if: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.CLOWNFISH_GH_TOKEN }}
        run: npm run apply-result -- "${{ inputs.job }}" --latest

      - name: Upload worker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: projectclownfish-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .projectclownfish/runs/**
          if-no-files-found: warn
